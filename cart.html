<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Gerencie seus itens adicionados ao carrinho na ApexMarket e finalize sua compra com segurança." />
  <title>Shopsmart | Carrinho de Compras</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <header class="main-header">
    <div class="header-container">

      <a href="index.html" class="logo-area">
        <div class="logo-area">
          <img class="logo-icon" src="image/logo.webp" alt="Logo da Loja">
        </div>
      </a>

      <nav class="main-nav" aria-label="Navegação Principal">
        <ul id="primary-navigation" class="nav-list">
          <li><a href="index.html" class="nav-link active">Início</a></li>
          <li><a href="gallery.html" class="nav-link">Produtos</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <a href="cart.html" class="nav-link cart-link" aria-label="Acessar Carrinho de Compras">
          <i class="fa-solid fa-cart-shopping cart-icon" aria-hidden="true"></i>
          <span id="cart-counter" class="cart-badge">0</span>
        </a>

        <button id="mobile-menu-btn" class="menu-toggle" aria-controls="primary-navigation" aria-expanded="false"
          aria-label="Abrir menu de navegação">
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
      </div>

    </div>
  </header>

  <main class="cart-page-container">
    <h2 class="page-title">Seu Carrinho de Compras</h2>

    <div class="cart-layout">
      <section class="cart-items-section" id="cart-items-container" aria-label="Itens no carrinho"></section>

      <section class="cart-summary-section" id="cart-summary" aria-label="Resumo do pedido">
        <div class="summary-box">
          <h3>Resumo do Pedido</h3>
          <div class="summary-row">
            <span>Total estimado:</span>
            <span id="cart-total-value" class="total-price">$0.00</span>
          </div>
          <button id="btn-checkout" class="btn btn-checkout">
            Finalizar Compra
          </button>
        </div>
      </section>
    </div>
  </main>

  <div id="checkout-modal" class="modal-overlay" aria-hidden="true" role="dialog">
    <div class="modal-content">
      <button id="close-modal" class="modal-close-btn" aria-label="Fechar Modal">
        &times;
      </button>
      <div class="modal-icon">🎉</div>
      <h3 class="modal-title">Pedido Processado!</h3>
      <p id="modal-message-text" class="modal-text"></p>
      <div class="modal-badge">
        <p>
          💡 Importante: Compras acima de
          <strong>$500.00</strong> garantem Frete Grátis!
        </p>
      </div>
    </div>
  </div>

  <footer class="main-footer">
    <div class="footer-container">
      <p class="footer-copy">
        &copy; 2026 shopsmart. Todos os direitos reservados.
      </p>
      <nav class="social-nav" aria-label="Redes Sociais">
        <ul>
          <li>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="social-link">Instagram</a>
          </li>
          <li>
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="social-link">LinkedIn</a>
          </li>
          <li>
            <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="social-link">Twitter</a>
          </li>
        </ul>
      </nav>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
