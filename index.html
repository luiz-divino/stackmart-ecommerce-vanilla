<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ApexMarket - O seu e-commerce completo com os melhores produtos tecnológicos e lifestyle do mercado.">
    <title>ApexMarket | Início</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon" aria-hidden="true"><img src="image/logo.webp" alt="logo do site"></span>
            </div>
            <nav class="main-nav" aria-label="Navegação Principal">
                <ul>
                    <li><a href="index.html" class="nav-link active">Início</a></li>
                    <li><a href="gallery.html" class="nav-link">Produtos</a></li>
                    <li><a href="cart.html" class="nav-link">Carrinho</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="home-main">
        <section class="hero-section">
            <div class="hero-overlay"></div>
            <img src="/image/hero-fundo-image.webp" 
                 alt="Conexão digital e produtos modernos expostos conceitualmente" 
                 class="hero-image" 
                 loading="eager">
            <div class="hero-content">
                <h2 class="hero-title">O Futuro das suas Compras Está Aqui</h2>
                <p class="hero-subtitle">Explore uma curadoria exclusiva de produtos globais com entrega rápida e segurança garantida.</p>
                <a href="gallery.html" class="btn btn-cta">Explorar Produtos</a>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p class="footer-copy">&copy; 2026 ApexMarket. Todos os direitos reservados.</p>
            <nav class="social-nav" aria-label="Redes Sociais">
                <ul>
                    <li><a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="social-link">Instagram</a></li>
                    <li><a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="social-link">LinkedIn</a></li>
                    <li><a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="social-link">Twitter</a></li>
                </ul>
            </nav>
        </div>
    </footer>

</body>
</html>
