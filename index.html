<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="image/logo.webp" type="image/x-icon">
    <title>Stackmart e-commerce</title>
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo" aria-label="Página inicial">
                <img src="image/logo.webp" alt="Logotipo Meu Site" class="logo-img">
            </a>
            <nav class="main-nav" aria-label="Menu principal">
                <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false">☰</button>
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Início</a></li>
                    <li><a href="gallery.html" class="nav-link">Produtos</a></li>
                    <li><a href="cart.html" class="nav-link">Carrinho</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content-home">
        <!-- ========== HERO SECTION (NOVO) ========== -->
        <section class="hero" aria-label="Destaque principal">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title">Compras <span class="hero-highlight">inteligentes</span><br>para o seu dia a dia
                </h1>
                <p class="hero-subtitle">Descubra produtos com curadoria tech, preços competitivos e entrega rápida.</p>
                <a href="gallery.html" class="hero-cta" aria-label="Ver todos os produtos">Ver produtos →</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p class="footer-copy">&copy; 2026 - Projeto Front-end</p>
            <ul class="social-links">
                <li><a href="#" class="social-link">Instagram</a></li>
                <li><a href="#" class="social-link">Facebook</a></li>
                <li><a href="#" class="social-link">Twitter</a></li>
            </ul>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
