<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore nosso catálogo completo de produtos na ApexMarket. Filtre por categorias e busque em tempo real.">
    <title>ApexMarket | Galeria de Produtos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon" aria-hidden="true"><img src="image/logo.webp" alt=""></span>
            </div>
            <nav class="main-nav" aria-label="Navegação Principal">
                <ul>
                    <li><a href="index.html" class="nav-link">Início</a></li>
                    <li><a href="gallery.html" class="nav-link active">Produtos</a></li>
                    <li>
                      <a href="cart.html" class="nav-link cart-link" aria-label="Acessar Carrinho de Compras">
                        <i class="fa-solid fa-cart-shopping cart-icon" aria-hidden="true"></i>
                        <span id="cart-counter" class="cart-badge">0</span>
                      </a>
                  </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="gallery-page">
        
      <section class="controls-section" aria-label="Filtros e Busca">
    
        <div class="search-bar-fullwidth">
            <input type="search" id="search-input" placeholder="Buscar produtos" aria-label="Buscar produtos">
        </div>
    
        <div class="categories-wrap" id="categories-filter" aria-label="Filtrar por Categoria">
            </div>
    
    </section>

        <div id="loading-spinner" class="spinner-container" aria-live="polite">
            <div class="spinner"></div>
            <p>Carregando catálogo de produtos...</p>
        </div>

        <section class="products-section">
            <div id="products-grid" class="products-grid">
                </div>
        </section>

    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p class="footer-copy">&copy; 2026 ApexMarket. Todos os direitos reservados.</p>
            <nav class="social-nav" aria-label="Redes Sociais">
                <ul>
                    <li><a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="social-link">Instagram</a></li>
                    <li><a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="social-link">LinkedIn</a></li>
                    <li><a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="social-link">Twitter</a></li>
                </ul>
            </nav>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
